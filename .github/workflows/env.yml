name: Get Env

on:
  workflow_dispatch:

jobs:
  generate-logs:
    name: Print Env - ${{ matrix.os }} [${{ matrix.runner_owner }}]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # - os: self-hosted
          #   runner_owner: "github-hosted"
          - os: ubuntu-24.04-ppc64le
            runner_owner: "actions-runner-ppc64le"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Hold runner for 10 minutes
        run: |
          echo "Starting 10-minute timer..."
          sleep 600
          echo "10 minutes complete!"
