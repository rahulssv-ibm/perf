name: Test Kata apt failure

# Trigger the workflow on pushes and pull requests to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-24.04-ppc64le

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          # push: false ensures it only tests the build and doesn't try to upload it to a registry
          push: false 
          tags: my-ubuntu-image:test
          # Cache layers to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
