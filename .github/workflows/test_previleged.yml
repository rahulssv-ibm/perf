name: Kubernetes Kind Workflow (ppc64le)

on:
  workflow_dispatch:

jobs:
  test-k8s-deployment:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-kata-test, ubuntu-24.04-ppc64le-vm]
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Install Go WITHOUT sudo ──
      - name: Install Go for ppc64le
        run: |
          ARCH=$(uname -m)
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          GO_VERSION="1.24.0"
          TARBALL="go${GO_VERSION}.${OS}-${ARCH}.tar.gz"
          URL="https://go.dev/dl/${TARBALL}"

          # Install into a user-writable directory
          GOROOT="$HOME/goroot"
          mkdir -p "$GOROOT"
          echo "Downloading ${URL} ..."
          wget -q "$URL" -O "$TARBALL"
          tar -xzf "$TARBALL" -C "$GOROOT" --strip-components=1
          rm -f "$TARBALL"

          # Persist GOROOT, GOPATH, and PATH
          echo "GOROOT=$GOROOT" >> $GITHUB_ENV
          echo "GOPATH=$HOME/go" >> $GITHUB_ENV          # module cache will be here
          echo "$GOROOT/bin" >> $GITHUB_PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH       # for kind binary

          # Verify
          "$GOROOT/bin/go" version

      # ── Build kind (no sudo needed) ──
      - name: Build and install kind
        run: |
          # KIND_VERSION file is optional
          if [ -f KIND_VERSION ]; then
            KIND_BRANCH=$(cat KIND_VERSION)
          else
            echo "⚠️  KIND_VERSION file not found. Falling back to v0.31.0"
            KIND_BRANCH="v0.31.0"
          fi

          git clone -b "$KIND_BRANCH" https://github.com/kubernetes-sigs/kind
          cd kind

          PATCH_URL="https://raw.githubusercontent.com/ppc64le-cloud/kind-image/main/build-ppc64le.patch"
          wget -q "$PATCH_URL" -O ../build-ppc64le.patch
          git apply ../build-ppc64le.patch

          # Build only (the binary will be at bin/kind inside the 'kind' directory)
          make kind

          # Manually install to ~/.local/bin (which is on PATH)
          mkdir -p "$HOME/.local/bin"
          cp bin/kind "$HOME/.local/bin/kind"
          chmod +x "$HOME/.local/bin/kind"

          # Confirm
          which kind
          kind version

      - name: Install kubectl for ppc64le
        run: |
          KUBECTL_VERSION="v1.29.3"
          mkdir -p "$HOME/.local/bin"
          curl -Lo "$HOME/.local/bin/kubectl" \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/ppc64le/kubectl"
          chmod +x "$HOME/.local/bin/kubectl"
          kubectl version --client

      - name: Create k8s Kind Cluster
        run: |
          IMAGE_TAG="v1.30.2"
          kind create cluster \
            --name test-cluster \
            --image quay.io/powercloud/kind-node:${IMAGE_TAG} \
            --wait 120s

      - name: Verify Cluster Info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Test Example Deployment
        run: |
          kubectl create deployment nginx-test --image=nginx
          kubectl wait --for=condition=available --timeout=90s deployment/nginx-test
          kubectl get pods
