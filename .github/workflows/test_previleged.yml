name: Kubernetes Kind Workflow

on:
  workflow_dispatch: 

jobs:
  test-k8s-deployment:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04-ppc64le, ubuntu-24.04-ppc64le-vm]
    
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      ## Manually fetch the ppc64le binaries instead of relying on the action
      - name: Install kind and kubectl for ppc64le
        run: |
          # Download and install kind (v0.22.0)
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-ppc64le
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          
          # Download and install kubectl (v1.29.3)
          curl -LO https://dl.k8s.io/release/v1.29.3/bin/linux/ppc64le/kubectl
          chmod +x ./kubectl
          sudo mv ./kubectl /usr/local/bin/kubectl

      ## Run the exact command the action was attempting to run
      - name: Create k8s Kind Cluster
        run: |
          kind create cluster \
            --name test-cluster \
            --image quay.io/powercloud/kind-node:v1.30.2 \
            --wait 120s

      - name: Verify Cluster Info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Test Example Deployment
        run: |
          kubectl create deployment nginx-test --image=nginx
          kubectl wait --for=condition=available --timeout=90s deployment/nginx-test
          kubectl get pods
