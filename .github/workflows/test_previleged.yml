name: Kubernetes Kind Workflow

on:
  workflow_dispatch: 

jobs:
  test-k8s-deployment:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04-ppc64le, ubuntu-24.04-ppc64le-vm]
    
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      ## Fetch binaries to a local user directory to avoid sudo
      - name: Install kind and kubectl locally
        run: |
          # Create a local bin directory for the runner user
          mkdir -p $HOME/.local/bin
          
          # Download and install kind (v0.22.0)
          curl -Lo $HOME/.local/bin/kind https://kind.sigs.k8s.io/dl/v0.22.0/kind-linux-ppc64le
          chmod +x $HOME/.local/bin/kind
          
          # Download and install kubectl (v1.29.3)
          curl -Lo $HOME/.local/bin/kubectl https://dl.k8s.io/release/v1.29.3/bin/linux/ppc64le/kubectl
          chmod +x $HOME/.local/bin/kubectl
          
          # Add the local bin directory to GITHUB_PATH for subsequent steps
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      ## Run cluster creation using the locally installed kind
      - name: Create k8s Kind Cluster
        run: |
          kind create cluster \
            --name test-cluster \
            --image quay.io/powercloud/kind-node:v1.30.2 \
            --wait 120s

      - name: Verify Cluster Info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Test Example Deployment
        run: |
          kubectl create deployment nginx-test --image=nginx
          kubectl wait --for=condition=available --timeout=90s deployment/nginx-test
          kubectl get pods
