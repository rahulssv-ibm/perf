name: Kubernetes Kind Workflow

on:
  workflow_dispatch: 

jobs:
  test-k8s-deployment:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04-ppc64le, ubuntu-24.04-ppc64le-vm]
    
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Go to compile Kind natively for ppc64le
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install kind (via Go) and kubectl locally
        run: |
          # 1. Compile kind from source natively
          go install sigs.k8s.io/kind@v0.22.0
          # Add the Go bin directory to the runner's path
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH
          
          # 2. Download the pre-compiled kubectl (which DOES exist for ppc64le)
          mkdir -p $HOME/.local/bin
          curl -Lo $HOME/.local/bin/kubectl https://dl.k8s.io/release/v1.29.3/bin/linux/ppc64le/kubectl
          chmod +x $HOME/.local/bin/kubectl
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create k8s Kind Cluster
        run: |
          kind create cluster \
            --name test-cluster \
            --image quay.io/powercloud/kind-node:v1.30.2 \
            --wait 120s

      - name: Verify Cluster Info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Test Example Deployment
        run: |
          kubectl create deployment nginx-test --image=nginx
          kubectl wait --for=condition=available --timeout=90s deployment/nginx-test
          kubectl get pods
