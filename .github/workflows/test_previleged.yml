name: Kubernetes Kind Workflow (ppc64le)

on:
  workflow_dispatch:

jobs:
  test-k8s-deployment:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-24.04-ppc64le, ubuntu-24.04-ppc64le-vm]
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Install Go exactly as your documentation specifies
      - name: Install Go for ppc64le
        run: |
          ARCH=$(uname -m)
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          GO_VERSION="1.24.0"
          TARBALL="go${GO_VERSION}.${OS}-${ARCH}.tar.gz"
          URL="https://go.dev/dl/${TARBALL}"

          echo "Downloading ${URL} ..."
          wget -q "$URL" -O "$TARBALL"

          # sudo is required to write to /usr/local
          sudo tar -xzf "$TARBALL" -C /usr/local
          rm -f "$TARBALL"

          # Persist GOPATH and PATH for the rest of the job
          echo "GOPATH=/usr/local/go" >> $GITHUB_ENV
          echo "/usr/local/go/bin" >> $GITHUB_PATH

          # Verify installation
          /usr/local/go/bin/go version

      # 2. Clone the specific version of kind, apply the patch, and install
      - name: Build and install kind
        run: |
          # Read the desired branch/tag from the KIND_VERSION file in your repo
          KIND_BRANCH=$(cat KIND_VERSION)
          git clone -b "$KIND_BRANCH" https://github.com/kubernetes-sigs/kind
          cd kind

          # Download the ppc64le patch directly from the upstream source
          PATCH_URL="https://raw.githubusercontent.com/ppc64le-cloud/kind-image/main/build-ppc64le.patch"
          wget -q "$PATCH_URL" -O ../build-ppc64le.patch
          git apply ../build-ppc64le.patch

          # Build and install the kind binary
          make install

          # Confirm the binary is available
          which kind
          kind version

      # 3. Create a kind cluster using your custom ppc64le node image
      - name: Create k8s Kind Cluster
        run: |
          # You can parameterize the image tag however you like
          IMAGE_TAG="v1.30.2"
          kind create cluster \
            --name test-cluster \
            --image quay.io/powercloud/kind-node:${IMAGE_TAG} \
            --wait 120s

      # 4. Verify the cluster is operational
      - name: Verify Cluster Info
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Test Example Deployment
        run: |
          kubectl create deployment nginx-test --image=nginx
          kubectl wait --for=condition=available --timeout=90s deployment/nginx-test
          kubectl get pods
